name: moov_editor
description: Professional cross-platform video editor.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # MVVM state
  provider: ^6.1.2

  # Video
  video_player: ^2.9.1
  chewie: ^1.8.5
  ffmpeg_kit_flutter_new: ^4.1.0
  video_thumbnail: ^0.5.3

  # Audio
  just_audio: ^0.9.40
  audio_waveforms: ^1.2.0

  # Files
  file_picker: ^8.1.2
  image_picker: ^1.1.2
  image: ^4.2.0
  path_provider: ^2.1.4

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.3
  google_sign_in: ^6.2.1

  # Storage
  shared_preferences: ^2.3.2
  sqflite: ^2.3.3+1

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lucide_icons: ^0.257.0
  animations: ^2.0.11

  # Utils
  intl: ^0.20.0
  uuid: ^4.5.1
  permission_handler: ^11.3.1
  gallery_saver_plus: ^3.2.6
  record: ^5.2.1
  package_info_plus: ^8.0.2
  url_launcher: ^6.3.1

dependency_overrides:
  record_linux: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 24
  adaptive_icon_background: "#3B82F6"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"

flutter_native_splash:
  color: "#0B0E14"
  image: assets/icons/app_icon.png
  android_12:
    icon_background_color: "#3B82F6"
    image: assets/icons/app_icon.png

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icons/
